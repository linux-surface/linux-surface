# Surface Pro 11 (Intel) Speaker EQ - PipeWire Filter-Chain
#
# 8-band biquad IIR equalizer tuned for the Surface Pro 11 internal speakers.
# Creates a virtual sink "Surface Pro 11 Speaker (EQ)" that applies frequency
# correction before routing audio to the hardware speaker.
#
# The coefficients compensate for the speaker enclosure's frequency response:
#   Bands 1-2: High-pass ~35 Hz (removes subsonic content the speakers can't reproduce)
#   Bands 3-8: Mid/high frequency correction (flattens resonances and dips)
#
# Source: Biquad coefficients extracted from Microsoft's SurfaceAPO_3070.json
# (Surface Audio Framework 4.0, EFX MainEQ section). These are numerical IIR
# filter coefficients representing the acoustic correction curve measured for
# this speaker enclosure.
#
# Transfer function: H(z) = (b0 + b1*z^-1 + b2*z^-2) / (a0 + a1*z^-1 + a2*z^-2)
# Sample rate: 48 kHz
#
# To adjust: You can bypass individual bands by setting b0=1, b1=0, b2=0,
# a0=1, a1=0, a2=0 for that stage. Or modify the install script to skip
# this config entirely.

context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Surface Pro 11 Speaker (EQ)"
            media.name       = "Surface Pro 11 Speaker EQ"
            filter.graph = {
                nodes = [
                    # Band 1: High-pass ~35 Hz (DC/subsonic removal)
                    {
                        type = builtin
                        name = eq_band_1
                        label = bq_raw
                        control = {
                            "b0" = 0.995379448
                            "b1" = -1.9907589
                            "b2" = 0.995379448
                            "a0" = 1.0
                            "a1" = -1.99073756
                            "a2" = 0.9907802
                        }
                    }
                    # Band 2: High-pass ~35 Hz (cascaded for steeper rolloff)
                    {
                        type = builtin
                        name = eq_band_2
                        label = bq_raw
                        control = {
                            "b0" = 0.9953802
                            "b1" = -1.99076045
                            "b2" = 0.9953802
                            "a0" = 1.0
                            "a1" = -1.99073911
                            "a2" = 0.9907817
                        }
                    }
                    # Band 3: Resonant correction ~3350 Hz
                    {
                        type = builtin
                        name = eq_band_3
                        label = bq_raw
                        control = {
                            "b0" = 0.8772983
                            "b1" = -1.438406
                            "b2" = 0.753693342
                            "a0" = 1.0
                            "a1" = -1.438406
                            "a2" = 0.630991638
                        }
                    }
                    # Band 4: Broad boost ~7942 Hz
                    {
                        type = builtin
                        name = eq_band_4
                        label = bq_raw
                        control = {
                            "b0" = 1.27760208
                            "b1" = -1.19804
                            "b2" = 0.7108211
                            "a0" = 1.0
                            "a1" = -0.732730031
                            "a2" = 0.5231132
                        }
                    }
                    # Band 5: Notch correction ~2308 Hz
                    {
                        type = builtin
                        name = eq_band_5
                        label = bq_raw
                        control = {
                            "b0" = 0.9670098
                            "b1" = -1.6799314
                            "b2" = 0.8070718
                            "a0" = 1.0
                            "a1" = -1.6799314
                            "a2" = 0.774081647
                        }
                    }
                    # Band 6: Correction ~9483 Hz
                    {
                        type = builtin
                        name = eq_band_6
                        label = bq_raw
                        control = {
                            "b0" = 0.9791422
                            "b1" = -0.5776825
                            "b2" = 0.8180314
                            "a0" = 1.0
                            "a1" = -0.5776825
                            "a2" = 0.79717356
                        }
                    }
                    # Band 7: High-mid boost ~5972 Hz
                    {
                        type = builtin
                        name = eq_band_7
                        label = bq_raw
                        control = {
                            "b0" = 1.0202843
                            "b1" = -1.30342245
                            "b2" = 0.8230331
                            "a0" = 1.0
                            "a1" = -1.30342245
                            "a2" = 0.843317449
                        }
                    }
                    # Band 8: Correction ~746 Hz
                    {
                        type = builtin
                        name = eq_band_8
                        label = bq_raw
                        control = {
                            "b0" = 0.987277031
                            "b1" = -1.86327338
                            "b2" = 0.8890019
                            "a0" = 1.0
                            "a1" = -1.86327338
                            "a2" = 0.876278937
                        }
                    }
                ]
                links = [
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                    { output = "eq_band_5:Out" input = "eq_band_6:In" }
                    { output = "eq_band_6:Out" input = "eq_band_7:In" }
                    { output = "eq_band_7:Out" input = "eq_band_8:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "surface_speaker_eq_input"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name      = "surface_speaker_eq_output"
                node.passive   = true
                # IMPORTANT: Update this to match your speaker sink name.
                # Find yours with: wpctl status
                # Common name on Surface Pro 11:
                target.object  = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink"
            }
        }
    }
]
