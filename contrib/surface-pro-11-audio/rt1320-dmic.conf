# Use case Configuration for RT1320 SoundWire DMIC (microphone function)
#
# The RT1320 codec on the Surface Pro 11 has two SDCA functions:
#   - AF04 (SimpleAmp): speaker amplifier, handled by rt1320.conf (upstream)
#   - AF02 (SimpleMic): microphone capture, handled by THIS file
#
# The kernel patch (soc_sdw_rt_dmic.c) remaps the component name from
# "rt1320-1" to "rt1320-dmic" so that UCM discovers this file via the
# MicCodec regex in sof-soundwire.conf.
#
# This file is NOT yet upstream in alsa-ucm-conf. Once upstreamed, this
# copy can be removed.
#
# Install: sudo cp rt1320-dmic.conf /usr/share/alsa/ucm2/sof-soundwire/

SectionDevice."Mic" {
	Comment	"SoundWire Microphone"

	EnableSequence [
		cset "name='rt1320-1 FU Capture Switch' on,on,on,on"
	]

	DisableSequence [
		cset "name='rt1320-1 FU Capture Switch' off,off,off,off"
	]

	Value {
		CapturePriority 100
		CapturePCM "hw:${CardId},4"
		CaptureSwitch "rt1320-1 FU Capture Switch"
		CaptureVolume "rt1320-1 FU Capture Volume"
		CaptureMixerElem "rt1320-1 FU"
	}
}
