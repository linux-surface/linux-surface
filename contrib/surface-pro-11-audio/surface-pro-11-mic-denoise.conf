# Surface Pro 11 (Intel) Microphone Noise Suppression - PipeWire Filter-Chain
#
# RNNoise-based neural noise suppression for the internal microphone.
# Creates a virtual source "Surface Pro 11 Mic (Denoised)" that applications
# can select instead of the raw hardware mic.
#
# Uses open-source RNNoise (BSD-3 license, Jean-Marc Valin / Xiph.org / Mozilla).
# No proprietary components.
#
# Requires: librnnoise_ladspa.so
#   - Ubuntu/Debian: build from https://github.com/werman/noise-suppression-for-voice
#   - Fedora: sudo dnf install noise-suppression-for-voice
#   - Arch: yay -S noise-suppression-for-voice
#
# The "nofail" flag means PipeWire will start normally even if RNNoise is
# not installed — the virtual mic source simply won't appear.
#
# To adjust sensitivity: change "VAD Threshold (%)" (0-95). Higher values
# require stronger voice signal to pass through. 50 is a good default.

context.modules = [
    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Surface Pro 11 Mic (Denoised)"
            media.name       = "Surface Pro 11 Mic Denoised"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = rnnoise
                        plugin = "librnnoise_ladspa"
                        label  = noise_suppressor_stereo
                        control = {
                            "VAD Threshold (%)" = 50.0
                        }
                    }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name    = "surface_mic_denoise_input"
                node.passive = true
                # IMPORTANT: Update this to match your microphone source name.
                # Find yours with: wpctl status
                # Common name on Surface Pro 11:
                target.object = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Mic__source"
            }
            playback.props = {
                node.name   = "surface_mic_denoise_output"
                media.class = Audio/Source
            }
        }
    }
]
